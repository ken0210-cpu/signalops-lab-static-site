<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>比較 | SignalOps Lab</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="container section">
    <div class="badge">offer comparison</div>
    <h1>なぜ低単価大量販売ではなく高単価導入支援なのか</h1>
    <div class="grid grid-2">
      <div class="card">
        <h2>高単価導入支援</h2>
        <ul class="list">
          <li>必要成約数: 5件/月</li>
          <li>必要リード数: 25件/月</li>
          <li>必要流入: 1,000/月想定</li>
          <li>匿名ブランドでも成立しやすい</li>
        </ul>
      </div>
      <div class="card">
        <h2>低単価デジタル販売</h2>
        <ul class="list">
          <li>必要成約数: 44件〜133件/月</li>
          <li>必要流入: 203,750〜738,900/月想定</li>
          <li>集客母数が重すぎる</li>
          <li>今の土台では遠回り</li>
        </ul>
      </div>
    </div>
    <div class="notice">月130万円を目標にするなら、今は高単価案件集中の方が現実的。</div>
    <div class="cta-row"><a class="button" href="intake.html">高単価導入の相談をする</a></div>
  </main>

</html>

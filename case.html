<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>導入イメージ | SignalOps Lab</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="container section">
    <div class="badge">deployment image</div>
    <h1>導入後のイメージ</h1>
    <div class="grid grid-3">
      <div class="card"><h3>問い合わせ整理</h3><p class="small">入力項目を固定し、曖昧な相談を扱いやすい形へ要約。</p></div>
      <div class="card"><h3>FAQ返答</h3><p class="small">よくある質問は叩き台を生成し、確認だけ人間が行う。</p></div>
      <div class="card"><h3>通知</h3><p class="small">優先度が高いものだけ通知し、対応漏れを減らす。</p></div>
      <div class="card"><h3>提案前処理</h3><p class="small">ヒアリング内容を提案に使える構造へ変換する。</p></div>
      <div class="card"><h3>運用負荷削減</h3><p class="small">ゼロから書く回数を減らし、判断だけ人間側に寄せる。</p></div>
      <div class="card"><h3>30日導入</h3><p class="small">最小導入範囲に絞って、まず回る形を作る。</p></div>
    </div>
    <div class="cta-row"><a class="button" href="intake.html">この形で相談する</a></div>
  </main>
</body>
</html>
